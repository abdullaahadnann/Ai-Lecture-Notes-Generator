<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lecture Notes Generator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230C447C%22/><text y=%22.9em%22 font-size=%2265%22 x=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22>📄</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Header -->
    <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
    </svg>
    <div class="header-text">
        <span class="header-title">AI Lecture Notes Generator</span>
        <span class="header-subtitle">Powered by Whisper + Fine-tuned BART</span>
    </div>
</div>

    <!-- Main Container -->
    <div class="container">

        <!-- Input Section -->
        <div class="card">

            <!-- Topic Input -->
            <div class="form-group">
                <label>Topic Name</label>
                <input type="text" id="topic" placeholder="e.g. Neural Networks" />
            </div>

            <!-- Audio Upload -->
            <div class="upload-area" id="uploadArea">
                <svg class="upload-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="upload-text">Drag and drop your audio file here</p>
                <p class="upload-hint">Supports mp3, wav, m4a, webm, mp4</p>
                <input type="file" id="audioFile" accept=".mp3,.wav,.m4a,.webm,.mp4" hidden />
                <button class="browse-btn" onclick="document.getElementById('audioFile').click()">
                    Browse File
                </button>
                <p class="file-name" id="fileName">No file selected</p>
            </div>

            <!-- Generate Button -->
            <button class="generate-btn" id="generateBtn" onclick="generateNotes()">
                Generate Notes
            </button>

        </div>

        <!-- Loading State -->
        <div class="card loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <p id="loadingText">Transcribing audio...</p>
        </div>

        <!-- Results Section -->
        <div class="card" id="results" style="display:none;">

            <!-- Notes Output -->
            <div class="results-header">
                <span class="results-title">Your Notes:</span>
                <button class="export-btn" onclick="exportNotes()">⬇️ Export</button>
            </div>

            <!-- Transcript -->
            <div class="section">
                <p class="section-title">Transcript:</p>
                <p class="section-content" id="transcript"></p>
            </div>

            <!-- Notes -->
            <div class="section">
                <p class="section-title">Structured Notes:</p>
                <div class="notes-wrapper">
                    <div class="notes-content" id="notes"></div>
                </div>
            </div>

        </div>

    </div>
    <div style="text-align:center; padding: 24px; font-size: 12px; color: #9b9bb0;">
    AI Lecture Notes Generator &nbsp;|&nbsp; Built with Whisper + BART &nbsp;|&nbsp; 2026
    </div>
    <script>
        // Show selected filename
        document.getElementById('audioFile').addEventListener('change', function() {
            const fileName = this.files[0] ? this.files[0].name : 'No file selected';
            document.getElementById('fileName').textContent = fileName;
        });

        // Drag and drop
        const uploadArea = document.getElementById('uploadArea');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                document.getElementById('audioFile').files = e.dataTransfer.files;
                document.getElementById('fileName').textContent = file.name;
            }
        });

        // Generate notes function
        async function generateNotes() {
            const topic = document.getElementById('topic').value;
            const audioFile = document.getElementById('audioFile').files[0];

            if (!audioFile) {
                alert('Please select an audio file first!');
                return;
            }

            // Show loading, hide results
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('generateBtn').disabled = true;

            // Loading messages
            const messages = [
                'Transcribing audio...',
                'Summarizing content...',
                'Formatting notes...'
            ];
            let i = 0;
            const interval = setInterval(() => {
                i = (i + 1) % messages.length;
                document.getElementById('loadingText').textContent = messages[i];
            }, 3000);

            // Send to Flask backend
            const formData = new FormData();
            formData.append('audio', audioFile);
            formData.append('topic', topic);

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                clearInterval(interval);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('generateBtn').disabled = false;

                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                // Show results
                document.getElementById('transcript').textContent = data.transcript;
                const notesText = data.notes;
                const lines = notesText.split('\n');

                let html = '';
                let inKeyTerms = false;
                let keyTermsHtml = '';

                for (const line of lines) {
                   if (line.includes('Topic:')) {
                        const title = line.replace('Topic:', '').trim();
                        html += `<div class="notes-topic-bar"><p class="notes-topic-title">Topic: <strong>${title}</strong></p></div>`;
                    } else if (line.includes('Key Points:')) {
                        html += `<div class="notes-section-title">Key Points</div>`;
                        inKeyTerms = false;
                    } else if (line.includes('Key Terms:')) {
                        html += `<div class="notes-section-title">Key Terms</div><div class="notes-terms-container">`;
                        inKeyTerms = true;
                    } else if (line.includes('key points extracted')) {
                        if (inKeyTerms) { html += `</div>`; inKeyTerms = false; }
                        html += `<div class="notes-divider"></div><div class="notes-count">${line.trim()}</div>`;
                    } else if (line.startsWith('  •')) {
                        const text = line.replace('  •', '').trim();
                        html += `<div class="notes-bullet">${text}</div>`;
                    } else if (line.startsWith('  -') && inKeyTerms) {
                        const term = line.replace('  -', '').trim();
                        html += `<span class="notes-term-pill">${term}</span>`;
                    } else if (line.includes('===')) {
                        html += `<div class="notes-divider"></div>`;
                    }
                }

                document.getElementById('notes').innerHTML = html;
                document.getElementById('results').style.display = 'block';
                document.getElementById('results').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                clearInterval(interval);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('generateBtn').disabled = false;
                alert('Something went wrong. Please try again.');
            }
        }

        // Export notes as text file
        function exportNotes() {
            const notes = document.getElementById('notes').textContent;
            const blob = new Blob([notes], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'lecture-notes.txt';
            a.click();
        }
    </script>

</body>
</html>
